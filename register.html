<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MakeYouBetter - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="font-sans bg-gradient-to-br from-slate-950 via-slate-900 to-purple-950 min-h-screen overflow-hidden">
    <div class="relative">
      <div class="glow-orb a"></div>
      <div class="glow-orb b"></div>
      <div class="glow-orb c"></div>

      <header class="relative z-10 px-8 pt-8 flex items-center justify-between">
        <div class="text-white">
          <div class="text-2xl font-bold tracking-tight">MakeYouBetter</div>
          <p class="text-slate-400 text-sm mt-1">Create an account in minutes.</p>
        </div>
        <a href="/login.html" class="text-slate-300 hover:text-white transition-colors text-sm font-medium">
          I have an account
        </a>
      </header>

      <main class="relative z-10 px-8 pb-14 pt-12">
        <div class="flex items-start justify-between gap-8">
          <div class="max-w-xl">
            <h1 class="text-white text-6xl font-bold leading-tight tracking-tight">
              Turn routines into <span class="text-purple-200">signals</span>.
            </h1>
            <p class="text-slate-400 text-lg mt-5">
              MakeYouBetter helps you record the essentials so your progress is never a mystery.
            </p>
          </div>

          <div class="w-full max-w-md">
            <section class="glass-panel rounded-2xl border border-slate-700/50 p-8 shadow-2xl">
              <h2 class="text-white text-3xl font-bold">Create your account</h2>
              <p class="text-slate-400 mt-2">Start logging today.</p>

              <form id="register-form" class="mt-6 space-y-4">
                <div>
                  <label class="text-slate-400 text-sm">Name</label>
                  <input
                    type="text"
                    name="name"
                    required
                    id="name"
                    class="mt-2 w-full glass-border bg-slate-950/30 px-4 py-3 rounded-xl text-white focus:ring-2 focus:ring-purple-400 outline-none"
                    placeholder="Your name"
                  />
                </div>

                <div>
                  <label class="text-slate-400 text-sm">Email</label>
                  <input
                    type="email"
                    name="email"
                    required
                    id="email"
                    class="mt-2 w-full glass-border bg-slate-950/30 px-4 py-3 rounded-xl text-white focus:ring-2 focus:ring-purple-400 outline-none"
                    placeholder="you@example.com"
                  />
                </div>

                <div>
                  <label class="text-slate-400 text-sm">Password</label>
                  <input
                    type="password"
                    name="password"
                    required
                    minlength="6"
                    id="password"
                    class="mt-2 w-full glass-border bg-slate-950/30 px-4 py-3 rounded-xl text-white focus:ring-2 focus:ring-purple-400 outline-none"
                    placeholder="At least 6 characters"
                  />
                </div>

                <button
                  type="submit"
                  class="w-full px-5 py-3 rounded-xl text-white font-semibold bg-gradient-to-r from-purple-600 to-pink-600 shadow-glow transition-all transform hover:scale-[1.01]"
                >
                  Register
                </button>
              </form>

              <div id="register-message" class="message mt-4 hidden"></div>

              <p class="text-slate-500 text-sm mt-4">
                Already have an account?
                <a href="/login.html" class="text-purple-300 hover:text-purple-200">Login</a>
              </p>
            </section>
          </div>
        </div>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
  </body>
</html>
