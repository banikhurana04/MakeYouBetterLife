<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Make You Better - Reset password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="font-sans bg-gradient-to-br from-slate-950 via-slate-900 to-purple-950 min-h-screen overflow-hidden">
    <div class="relative">
      <div class="glow-orb a"></div>
      <div class="glow-orb b"></div>
      <div class="glow-orb c"></div>

      <header class="relative z-10 px-8 pt-8 flex items-center justify-between">
        <div class="text-white">
          <div class="text-2xl font-bold tracking-tight">Make You Better</div>
          <p class="text-slate-400 text-sm mt-1">Choose a new password</p>
        </div>
        <a href="/login.html" class="text-slate-300 hover:text-white transition-colors text-sm font-medium">Login</a>
      </header>

      <main class="relative z-10 px-8 pb-14 pt-12 max-w-md mx-auto">
        <section class="glass-panel rounded-2xl border border-slate-700/50 p-8 shadow-2xl">
          <h1 class="text-white text-2xl font-bold">Reset password</h1>
          <p class="text-slate-400 text-sm mt-2">Use the link from your reset email (or dev response).</p>

          <form id="reset-form" class="mt-6 space-y-4">
            <div>
              <label class="text-slate-400 text-sm">Reset token</label>
              <input
                id="token"
                type="text"
                required
                readonly
                class="mt-2 w-full glass-border bg-slate-950/30 px-4 py-3 rounded-xl text-white text-sm outline-none opacity-90"
              />
            </div>
            <div>
              <label class="text-slate-400 text-sm">New password</label>
              <input
                id="password"
                type="password"
                required
                minlength="6"
                class="mt-2 w-full glass-border bg-slate-950/30 px-4 py-3 rounded-xl text-white focus:ring-2 focus:ring-purple-400 outline-none"
                placeholder="At least 6 characters"
              />
            </div>
            <button
              type="submit"
              class="w-full px-5 py-3 rounded-xl text-white font-semibold bg-gradient-to-r from-purple-600 to-pink-600 shadow-glow transition-all transform hover:scale-[1.01]"
            >
              Update password
            </button>
          </form>

          <div id="reset-message" class="message mt-4 hidden"></div>
        </section>
      </main>
    </div>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const tokenEl = document.getElementById('token');
        const token = params.get('token') || '';
        tokenEl.value = token;

        const form = document.getElementById('reset-form');
        const msgEl = document.getElementById('reset-message');

        function showMessage(type, text) {
          msgEl.className = 'message mt-4 ' + type;
          msgEl.textContent = text || '';
          msgEl.classList.remove('hidden');
        }

        if (!token) {
          tokenEl.removeAttribute('readonly');
          showMessage('error', 'Missing token. Paste a token from the reset link, or open the full URL with ?token=…');
        }

        form.addEventListener('submit', async function (e) {
          e.preventDefault();
          const password = document.getElementById('password').value;
          const t = tokenEl.value.trim();
          if (!t) {
            showMessage('error', 'Token is required.');
            return;
          }
          try {
            const res = await fetch('/reset-password', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ token: t, password }),
            });
            const data = await res.json().catch(function () {
              return {};
            });
            if (!res.ok) {
              showMessage('error', data.message || 'Reset failed.');
              return;
            }
            showMessage('success', data.message || 'Password updated.');
            form.querySelector('button[type="submit"]').disabled = true;
          } catch (err) {
            showMessage('error', err.message || 'Request failed.');
          }
        });
      })();
    </script>
  </body>
</html>
