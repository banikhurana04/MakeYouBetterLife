<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Make You Better - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="font-sans bg-gradient-to-br from-slate-950 via-slate-900 to-purple-950 min-h-screen overflow-hidden">
    <div class="relative">
      <div class="glow-orb a"></div>
      <div class="glow-orb b"></div>
      <div class="glow-orb c"></div>

      <header class="relative z-10 px-8 pt-8 flex items-center justify-between">
        <div class="text-white">
          <div class="text-2xl font-bold tracking-tight">Make You Better</div>
          <p class="text-slate-400 text-sm mt-1">Sign in to log your next win.</p>
        </div>
        <a href="/register.html" class="text-slate-300 hover:text-white transition-colors text-sm font-medium">
          Create account
        </a>
      </header>

      <main class="relative z-10 px-8 pb-14 pt-12">
        <div class="flex items-start justify-between gap-8">
          <div class="max-w-xl">
            <h1 class="text-white text-6xl font-bold leading-tight tracking-tight">
              Build consistency,
              <span class="text-pink-200">not pressure</span>.
            </h1>
            <p class="text-slate-400 text-lg mt-5">
              Your habits live in a clean timeline. Log it once, then keep moving.
            </p>
          </div>

          <div class="w-full max-w-md">
            <section class="glass-panel rounded-2xl border border-slate-700/50 p-8 shadow-2xl">
              <h2 class="text-white text-3xl font-bold">Welcome back</h2>
              <p class="text-slate-400 mt-2">Sign in and continue.</p>

              <form id="login-form" class="mt-6 space-y-4">
                <div>
                  <label class="text-slate-400 text-sm">Email</label>
                  <input
                    type="email"
                    name="email"
                    required
                    id="email"
                    class="mt-2 w-full glass-border bg-slate-950/30 px-4 py-3 rounded-xl text-white focus:ring-2 focus:ring-purple-400 outline-none"
                    placeholder="you@example.com"
                  />
                </div>

                <div>
                  <label class="text-slate-400 text-sm">Password</label>
                  <input
                    type="password"
                    name="password"
                    required
                    id="password"
                    class="mt-2 w-full glass-border bg-slate-950/30 px-4 py-3 rounded-xl text-white focus:ring-2 focus:ring-purple-400 outline-none"
                    placeholder="••••••••"
                  />
                </div>

                <button
                  type="submit"
                  class="w-full px-5 py-3 rounded-xl text-white font-semibold bg-gradient-to-r from-purple-600 to-pink-600 shadow-glow transition-all transform hover:scale-[1.01]"
                >
                  Login
                </button>
              </form>

              <div id="login-message" class="message mt-4 hidden"></div>

              <p class="text-slate-500 text-sm mt-4">
                <a href="/forgot-password" class="text-purple-300 hover:text-purple-200">Forgot password?</a>
              </p>

              <p class="text-slate-500 text-sm mt-4">
                New here?
                <a href="/register.html" class="text-purple-300 hover:text-purple-200">Create an account</a>
              </p>
            </section>
          </div>
        </div>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
  </body>
</html>
