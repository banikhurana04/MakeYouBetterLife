<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Make You Better - Forgot password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="font-sans bg-gradient-to-br from-slate-950 via-slate-900 to-purple-950 min-h-screen overflow-hidden">
    <div class="relative">
      <div class="glow-orb a"></div>
      <div class="glow-orb b"></div>
      <div class="glow-orb c"></div>

      <header class="relative z-10 px-8 pt-8 flex items-center justify-between">
        <div class="text-white">
          <div class="text-2xl font-bold tracking-tight">Make You Better</div>
          <p class="text-slate-400 text-sm mt-1">Request a password reset</p>
        </div>
        <a href="/login.html" class="text-slate-300 hover:text-white transition-colors text-sm font-medium">Login</a>
      </header>

      <main class="relative z-10 px-8 pb-14 pt-12 max-w-md mx-auto">
        <section class="glass-panel rounded-2xl border border-slate-700/50 p-8 shadow-2xl">
          <h1 class="text-white text-2xl font-bold">Forgot password</h1>
          <p class="text-slate-400 text-sm mt-2">Enter your email. In development, the reset link is shown below and logged on the server.</p>

          <form id="forgot-form" class="mt-6 space-y-4">
            <div>
              <label class="text-slate-400 text-sm">Email</label>
              <input
                id="email"
                type="email"
                required
                class="mt-2 w-full glass-border bg-slate-950/30 px-4 py-3 rounded-xl text-white focus:ring-2 focus:ring-purple-400 outline-none"
                placeholder="you@example.com"
              />
            </div>
            <button
              type="submit"
              class="w-full px-5 py-3 rounded-xl text-white font-semibold bg-gradient-to-r from-purple-600 to-pink-600 shadow-glow transition-all transform hover:scale-[1.01]"
            >
              Send reset link
            </button>
          </form>

          <div id="forgot-message" class="message mt-4 hidden"></div>
          <div id="reset-link-box" class="mt-4 hidden">
            <p class="text-slate-400 text-xs uppercase tracking-wide">Reset link (dev)</p>
            <a
              id="reset-link"
              href="#"
              class="mt-2 block text-sm text-purple-300 break-all hover:text-purple-200 underline"
            ></a>
          </div>
        </section>
      </main>
    </div>

    <script>
      (function () {
        const form = document.getElementById('forgot-form');
        const msgEl = document.getElementById('forgot-message');
        const linkBox = document.getElementById('reset-link-box');
        const linkEl = document.getElementById('reset-link');

        function showMessage(type, text) {
          msgEl.className = 'message mt-4 ' + type;
          msgEl.textContent = text || '';
          msgEl.classList.remove('hidden');
        }

        form.addEventListener('submit', async function (e) {
          e.preventDefault();
          linkBox.classList.add('hidden');
          const email = document.getElementById('email').value.trim();
          try {
            const res = await fetch('/forgot-password', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email }),
            });
            const data = await res.json().catch(function () {
              return {};
            });
            if (!res.ok) {
              showMessage('error', data.message || 'Request failed.');
              return;
            }
            showMessage('success', data.message || 'Done.');
            if (data.resetLink) {
              linkEl.href = data.resetLink;
              linkEl.textContent = data.resetLink;
              linkBox.classList.remove('hidden');
            }
          } catch (err) {
            showMessage('error', err.message || 'Request failed.');
          }
        });
      })();
    </script>
  </body>
</html>
